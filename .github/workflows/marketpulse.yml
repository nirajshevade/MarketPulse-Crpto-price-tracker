name: MarketPulse Automation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      run_with_docker:
        description: "Build and run pipeline using Docker too"
        required: false
        default: false
        type: boolean

concurrency:
  group: marketpulse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MarketPulse pipeline
        env:
          VS_CURRENCY: ${{ vars.VS_CURRENCY || 'usd' }}
          PRICE_CHANGE_THRESHOLD: ${{ vars.PRICE_CHANGE_THRESHOLD || '5' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED || 'false' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/run_pipeline.py

      - name: Detect generated changes
        id: detect_changes
        run: |
          if git status --porcelain README.md data charts | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data charts
          git commit -m "chore: update crypto snapshots and dashboard"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: No generated changes
        if: steps.detect_changes.outputs.has_changes != 'true'
        run: echo "No changes to commit"

  docker-run:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_with_docker == true }}
    runs-on: ubuntu-latest
    needs: run-pipeline
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t marketpulse:latest .

      - name: Run image
        env:
          VS_CURRENCY: ${{ vars.VS_CURRENCY || 'usd' }}
          PRICE_CHANGE_THRESHOLD: ${{ vars.PRICE_CHANGE_THRESHOLD || '5' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED || 'false' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          docker run --rm \
            -e VS_CURRENCY \
            -e PRICE_CHANGE_THRESHOLD \
            -e TELEGRAM_BOT_TOKEN \
            -e TELEGRAM_CHAT_ID \
            -e EMAIL_ENABLED \
            -e SMTP_HOST \
            -e SMTP_PORT \
            -e SMTP_USERNAME \
            -e SMTP_PASSWORD \
            -e EMAIL_FROM \
            -e EMAIL_TO \
            marketpulse:latest

